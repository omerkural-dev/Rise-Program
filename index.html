<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hizmet Savior</title>

<style>
body {
    margin: 0;
    overflow: auto;
    font-family: Arial, sans-serif;
    color: white;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
}

.section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}

.content {
    max-width: 600px;
    text-align: center;
}

h1 {
    font-size: 50px;
}

p {
    color: #ccc;
}

</style>
</head>

<body>

<!-- Scroll Sections -->
<div class="section"><div class="content"><h1>Hizmet Savior</h1><p>Your roadmap to discipline, success, and income</p></div></div>

<div class="section"><div class="content"><h1>Discipline</h1><p>Build habits that eliminate procrastination</p></div></div>

<div class="section"><div class="content"><h1>Academics</h1><p>Master focus and learning systems</p></div></div>

<div class="section"><div class="content"><h1>Income</h1><p>Learn real-world money skills</p></div></div>

<div class="section"><div class="content"><h1>Clarity</h1><p>No more confusion. Just execution.</p></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

// Renderer
const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lights
const light = new THREE.PointLight(0x22c55e, 2, 100);
light.position.set(5,5,5);
scene.add(light);

// Create floating objects (sections)
const objects = [];
const spacing = 8;

function createBox(y, color) {
    const geometry = new THREE.BoxGeometry(2,2,2);
    const material = new THREE.MeshStandardMaterial({color: color});
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.y = -y * spacing;
    scene.add(mesh);
    objects.push(mesh);
}

createBox(0, 0x22c55e);
createBox(1, 0x3b82f6);
createBox(2, 0xf59e0b);
createBox(3, 0xef4444);
createBox(4, 0x8b5cf6);

// Scroll tracking
let scrollY = window.scrollY;

window.addEventListener('scroll', () => {
    scrollY = window.scrollY;
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    // Move camera based on scroll
    camera.position.y = -scrollY * 0.01;

    // Rotate objects
    objects.forEach(obj => {
        obj.rotation.x += 0.01;
        obj.rotation.y += 0.01;
    });

    renderer.render(scene, camera);
}

animate();

// Resize fix
window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
</html>
